# Configuration file for pkgdown site
# See https://pkgdown.r-lib.org/articles/pkgdown.html for details
url: https://kanthanawit.github.io/talatThaiR/
title: talatThaiR
description: >
  Access Thai Agricultural Statistics from the National Agricultural Big Data Center (NABC) API.
  Provides daily, weekly, and monthly commodity prices as well as
  production and price indices at monthly, quarterly, and yearly frequencies.

# Template configuration
# Controls the overall appearance of your site
template:
  bootstrap: 5
  bootswatch: minty


# Home page configuration
# Contents automatically generated from index.md or README.md
home:
  # Sidebar with useful links (see ?build_home for customization)
  strip_header: false
  links:
    - text: "NABC API"
      href: https://agriapi.nabc.go.th/
    - text: "GitHub"
      href: https://github.com/kanthanawit/talatThaiR

# Navbar configuration
# Controls navigation bar on site
navbar:
  # Background color
  bg: primary
  # Customize navbar structure
  structure:
    # Left side navigation items (character vector of names)
    left: [intro, reference, articles]
    riight: [github]
  components:
    # Custom components (see ?build_navbar for details)
    intro:
      text: "เริ่มต้น"
      href: articles/getting-started.html
    reference:
      text: "ฟังชั่น"
      href: reference/index.html
    articles:
      text: "บทความ"
      manu:
        text: "เริ่มต้นเดินตลาด"
        href: articles/getting-stated.html
     

